name: Build & Release APK

on:
  push:
    tags:
      - 'v*'   # v1.0.0, v1.2.3 などのタグで起動

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Restore secrets
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > mobile/android/app/debug.keystore
          echo "${{ secrets.GOOGLE_SERVICES_BASE64 }}" | base64 --decode > mobile/android/app/google-services.json

      - name: Bundle JS
        working-directory: mobile
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: npx expo export:embed --platform android --bundle-output android/app/src/main/assets/index.android.bundle --dev false --reset-cache

      - name: Build Release APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -PGOOGLE_MAPS_API_KEY="${{ secrets.GOOGLE_MAPS_API_KEY }}" --rerun-tasks

      - name: Rename APK with version tag
        run: |
          VERSION="${{ github.ref_name }}"
          cp mobile/android/app/build/outputs/apk/release/app-release.apk \
             PALOGPTracker-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PALOGPTracker-*.apk
          generate_release_notes: true
          name: "PALOGPTracker ${{ github.ref_name }}"
          body: |
            ## インストール方法
            1. `PALOGPTracker-*.apk` をダウンロード
            2. Androidの設定 → アプリ → 「提供元不明のアプリ」を許可
            3. ダウンロードしたAPKをタップ → インストール
